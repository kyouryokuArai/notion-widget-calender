<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calendar</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body { background:#ffffff; height:100%; }
body { font-family:'Inter',sans-serif; display:flex; justify-content:center; align-items:center; padding:16px; }
.card {
  width:100%; padding:36px 48px;
  background:#141414; border-radius:20px; border:1px solid #2a2a2a;
  display:flex; flex-direction:column; gap:24px;
  position:relative; overflow:hidden;
}
.card::before {
  content:''; position:absolute; top:-60px; right:-60px;
  width:220px; height:220px;
  background:radial-gradient(circle, rgba(57,255,20,0.04) 0%, transparent 70%);
  pointer-events:none;
}
.top-row { display:flex; flex-direction:column; gap:4px; }
.year { font-size:10px; font-weight:400; letter-spacing:0.25em; color:#ff66a8; text-transform:uppercase; opacity:0.9; }
.month { font-size:11px; font-weight:500; letter-spacing:0.3em; color:#ffff00; text-transform:uppercase; text-shadow:0 0 8px rgba(255,255,0,0.7); }
.day-number { font-family:'DM Serif Display',serif; font-size:140px; line-height:1; color:#f0f0f0; letter-spacing:-8px; }
.bottom-row { display:flex; align-items:center; gap:12px; border-top:1px solid #888888; padding-top:20px; opacity: 0.8; }
.dot { width:6px; height:6px; border-radius:50%; background:#39ff14; box-shadow:0 0 6px rgba(57,255,20,0.8); flex-shrink:0; }
.weekday { font-size:11px; letter-spacing:0.25em; color:#00cfff; text-transform:uppercase; text-shadow:0 0 8px rgba(0,207,255,0.7); }
.weekday.sunday { color:#ff2020; text-shadow:0 0 8px rgba(255,32,32,0.7); }
.weekday.saturday { color:#39ff14; text-shadow:0 0 8px rgba(57,255,20,0.7); }
</style>
</head>
<body>
<div class="card">
  <div class="top-row">
    <div class="year" id="year"></div>
    <div class="month" id="month"></div>
  </div>
  <div class="day-number" id="day"></div>
  <div class="bottom-row">
    <div class="dot" id="dot"></div>
    <div class="weekday" id="weekday"></div>
  </div>
</div>
<script>
var months=["January","February","March","April","May","June","July","August","September","October","November","December"];
var weekdays=["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
function pad(n){return String(n).padStart(2,'0');}
function update(){
  var now=new Date();
  var dow=now.getDay();
  document.getElementById('month').textContent=months[now.getMonth()];
  document.getElementById('year').textContent=now.getFullYear();
  document.getElementById('day').textContent=pad(now.getDate());
  var wdEl=document.getElementById('weekday');
  wdEl.textContent=weekdays[dow];
  wdEl.className='weekday'+(dow===0?' sunday':dow===6?' saturday':'');
  var dot=document.getElementById('dot');
  dot.style.background=dow===0?'#ff6b6b':dow===6?'#6bb5ff':'#39ff14';
  dot.style.boxShadow=dow===0?'0 0 6px rgba(255,107,107,0.8)':dow===6?'0 0 6px rgba(107,181,255,0.8)':'0 0 6px rgba(57,255,20,0.8)';
}
update();
setInterval(update,60000);
</script>
</body>
</html>
